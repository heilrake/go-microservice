syntax = "proto3";

package user;

option go_package = "shared/proto/user;user";

service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc LoginUser(LoginUserRequest) returns (LoginUserResponse);
}

message User {
  string id = 1;
  string username = 2;
  string email = 3;
  string profile_picture = 4;
  string role = 5;  // "rider" | "driver"
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message CreateUserRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  string profile_picture = 4;
  string role = 5;  // "rider" | "driver" — required
}

message CreateUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  string user_id = 1;
  optional string username = 2;
  optional string email = 3;
  optional string profile_picture = 4;
}

message UpdateUserResponse {
  User user = 1;
}

message LoginUserRequest {
  string email = 1;
  string password = 2;
  string role = 3;  // "rider" | "driver" — login only if user has this role
}

message LoginUserResponse {
  User user = 1;
}
